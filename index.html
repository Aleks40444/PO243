<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ЧТО? - Personalized Cloud</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #1C1C1C; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    
    /* Стили авторизации */
    .auth-container { width: 100%; max-width: 500px; margin-bottom: 20px; }
    #loginBtn { background: #4285F4; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; }
    .user-bar { background: white; padding: 10px 20px; border-radius: 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #1C1C1C; }
    .logout-btn { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }

    /* Стили контента */
    .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 8px 4px 15px rgba(0,0,0,0.05); }
    input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    button#mainBtn { background: #1C1C1C; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
    button#mainBtn:disabled { background: #999; }

    .post { background: #fff; border: 1px solid #eaeaea; padding: 25px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; }
    .post-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .author-info { display: flex; align-items: center; gap: 10px; }
    .post-actions { display: flex; gap: 8px; }
    .icon-btn { cursor: pointer; border: none; background: none; font-size: 18px; padding: 5px; }
    .like-btn { cursor: pointer; border: none; background: #ffe0e0; padding: 8px 12px; border-radius: 20px; font-size: 14px; color: #900020; font-weight: 600; }
    .time { font-size: 11px; color: #999; }
    .badge { font-size: 11px; background: #f0f0f0; padding: 3px 8px; border-radius: 12px; color: #666; margin-left: 5px; }

    /* Модалки */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
    .modal-content { background-color: #fff; margin: 10% auto; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; }
</style>
</head>
<body>

<div class="auth-container">
    <button id="loginBtn">🔑 Войти через Google</button>
    <div id="userInfo" class="user-bar" style="display: none;">
        <img id="userPhoto" class="user-avatar" src="" alt="Avatar">
        <div style="flex-grow: 1;">
            <div id="userName" style="font-weight: 600; font-size: 14px;"></div>
            <button id="logoutBtn" class="logout-btn">Выйти</button>
        </div>
    </div>
</div>

<div class="container" id="editorSection" style="display: none;">
  <h3>📱 Новая запись</h3>
  <input type="text" id="name" placeholder="Имя" readonly>
  <input type="email" id="email" placeholder="Email" readonly>
  <textarea id="content" placeholder="Что нового?" rows="3"></textarea>
  <button id="mainBtn">🚀 Опубликовать</button>
</div>

<div id="feed"></div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <h2>✏️ Редактировать</h2>
    <input type="text" id="editName" readonly>
    <input type="email" id="editEmail" readonly>
    <textarea id="editContent" rows="3"></textarea>
    <div style="display:flex; gap:10px; margin-top:15px;">
        <button onclick="saveEdit()" style="flex:1; padding:10px; background:#1C1C1C; color:white; border-radius:6px; border:none;">Сохранить</button>
        <button onclick="closeEditModal()" style="flex:1; padding:10px; background:#ddd; border-radius:6px; border:none;">Отмена</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
  serverTimestamp, updateDoc, doc, increment, getDocs, where, deleteDoc  
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { 
  getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_8QC9gvQadWPJeooOhUZf_YCtDBQ_rAM",
  authDomain: "po243-1d556.firebaseapp.com",
  projectId: "po243-1d556",
  storageBucket: "po243-1d556.firebasestorage.app",
  messagingSenderId: "497922929256",
  appId: "1:497922929256:web:bf45df24e1a3feefaac1dd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentEditingId = null;

// === АВТОРИЗАЦИЯ ===
document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
document.getElementById('logoutBtn').onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
  const loginBtn = document.getElementById('loginBtn');
  const userInfo = document.getElementById('userInfo');
  const editorSection = document.getElementById('editorSection');

  if (user) {
    loginBtn.style.display = 'none';
    userInfo.style.display = 'flex';
    editorSection.style.display = 'block';
    
    document.getElementById('userName').innerText = user.displayName;
    document.getElementById('userPhoto').src = user.photoURL;
    document.getElementById('name').value = user.displayName;
    document.getElementById('email').value = user.email;
  } else {
    loginBtn.style.display = 'block';
    userInfo.style.display = 'none';
    editorSection.style.display = 'none';
  }
});

// === СОЗДАНИЕ ПОСТА ===
document.getElementById('mainBtn').onclick = async () => {
  const content = document.getElementById('content').value;
  if (!content.trim()) return alert("Напишите что-нибудь!");

  const btn = document.getElementById('mainBtn');
  btn.disabled = true;

  try {
    await addDoc(collection(db, "requests"), {
        name: auth.currentUser.displayName,
        email: auth.currentUser.email,
        photo: auth.currentUser.photoURL,
        content: content,
        likes: 0,
        timestamp: serverTimestamp()
    });
    document.getElementById("content").value = "";
    alert("✅ Готово!");
  } catch (e) {
    alert("Ошибка: " + e.message);
  } finally {
    btn.disabled = false;
  }
};

// === ПОЛУЧЕНИЕ ДАННЫХ (REAL-TIME) ===
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
  const feed = document.getElementById('feed');
  feed.innerHTML = "";
  
  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const isOwner = auth.currentUser && auth.currentUser.email === data.email;
    const editedBadge = data.edited ? ' <span class="badge">ред.</span>' : '';

    feed.innerHTML += `
      <div class="post">
        <div class="post-header">
          <div class="author-info">
            <img src="${data.photo || 'https://via.placeholder.com/40'}" class="user-avatar" style="width:30px; height:30px;">
            <div>
                <div><b>${data.name}</b>${editedBadge}</div>
                <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
            </div>
          </div>
          <div class="post-actions">
            ${isOwner ? `
                <button class="icon-btn" onclick="openEditModal('${docSnap.id}')">✏️</button>
                <button class="icon-btn" onclick="deleteRequestById('${docSnap.id}')" style="color:red;">🗑️</button>
            ` : ''}
          </div>
        </div>
        <p style="margin: 15px 0; line-height: 1.5;">${data.content}</p>
        <button class="like-btn" onclick="processLike('${docSnap.id}')">❤️ ${data.likes || 0}</button>
      </div>
    `;
  });
});

// === ФУНКЦИИ УПРАВЛЕНИЯ ===
window.processLike = async (id) => {
  if(!auth.currentUser) return alert("Войдите, чтобы ставить лайки!");
  await updateDoc(doc(db, "requests", id), { likes: increment(1) });
};

window.deleteRequestById = async (id) => {
  if (confirm("Удалить этот пост?")) {
    await deleteDoc(doc(db, "requests", id));
  }
};

window.openEditModal = async (id) => {
  const docSnap = await getDocs(query(collection(db, "requests"), where("__name__", "==", id)));
  if (!docSnap.empty) {
    const data = docSnap.docs[0].data();
    document.getElementById('editContent').value = data.content;
    document.getElementById('editName').value = data.name;
    document.getElementById('editEmail').value = data.email;
    currentEditingId = id;
    document.getElementById('editModal').style.display = 'block';
  }
};

window.saveEdit = async () => {
  const newContent = document.getElementById('editContent').value;
  await updateDoc(doc(db, "requests", currentEditingId), {
    content: newContent,
    edited: serverTimestamp()
  });
  closeEditModal();
};

window.closeEditModal = () => {
  document.getElementById('editModal').style.display = 'none';
};

window.onclick = (event) => {
  if (event.target == document.getElementById('editModal')) closeEditModal();
};
</script>
</body>
</html>
