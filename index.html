<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ЧТО? - Full Cloud App + DM</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #1C1C1C; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    
    /* Авторизация */
    .auth-container { width: 100%; max-width: 500px; margin-bottom: 20px; }
    #loginBtn { background: #4285F4; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .user-bar { background: white; padding: 10px 20px; border-radius: 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #1C1C1C; }
    .logout-btn { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }

    /* Форма создания */
    .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 8px 4px 15px rgba(0,0,0,0.05); }
    textarea, input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-family: 'Inter', sans-serif; }
    button.primary-btn { background: #1C1C1C; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
    button:disabled { background: #999 !important; }

    /* Посты */
    .post { background: #fff; border: 1px solid #eaeaea; padding: 25px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; }
    .post-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .author-info { display: flex; align-items: center; gap: 10px; }
    .post-image { width: 100%; margin-top: 15px; border-radius: 8px; display: block; border: 1px solid #eee; }
    .post-actions { display: flex; gap: 8px; }
    .icon-btn { cursor: pointer; border: none; background: none; font-size: 18px; }
    .like-btn { cursor: pointer; border: none; background: #ffe0e0; padding: 8px 12px; border-radius: 20px; font-size: 14px; color: #900020; font-weight: 600; margin-top: 10px; }
    .time { font-size: 11px; color: #999; }
    .badge { font-size: 11px; background: #f0f0f0; padding: 3px 8px; border-radius: 12px; color: #666; margin-left: 5px; }

    /* Модалки */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); }
    .modal-content { background-color: #fff; margin: 5% auto; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; position: relative; }
    
    /* Чат DM */
    #chatHistory { height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; }
    .msg.sent { align-self: flex-end; background: #4285F4; color: white; }
    .msg.received { align-self: flex-start; background: #f1f1f1; color: #333; }
</style>
</head>
<body>

<div class="auth-container">
    <button id="loginBtn">🔑 Войти через Google</button>
    <div id="userInfo" class="user-bar" style="display: none;">
        <img id="userPhoto" class="user-avatar" src="" alt="Avatar">
        <div style="flex-grow: 1;">
            <div id="userName" style="font-weight: 600; font-size: 14px;"></div>
            <button id="logoutBtn" class="logout-btn">Выйти</button>
        </div>
    </div>
</div>

<div class="container" id="editorSection" style="display: none;">
  <h3>📱 Что нового?</h3>
  <textarea id="content" placeholder="Напишите сообщение..." rows="3"></textarea>
  <input type="text" id="imageUrl" placeholder="Ссылка на картинку (URL)...">
  <button id="mainBtn" class="primary-btn">🚀 Опубликовать</button>
</div>

<div id="feed"></div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <h2>✏️ Редактировать</h2>
    <textarea id="editContent" rows="3"></textarea>
    <input type="text" id="editImageUrl" placeholder="Новая ссылка на фото...">
    <div style="display:flex; gap:10px; margin-top:15px;">
        <button onclick="saveEdit()" style="flex:1; padding:10px; background:#1C1C1C; color:white; border-radius:6px; border:none; cursor:pointer;">Сохранить</button>
        <button onclick="closeEditModal()" style="flex:1; padding:10px; background:#ddd; border-radius:6px; border:none; cursor:pointer;">Отмена</button>
    </div>
  </div>
</div>

<div id="dmModal" class="modal">
    <div class="modal-content">
      <h3 id="dmTitle">Чат с пользователем</h3>
      <div id="chatHistory"></div>
      <div style="display: flex; gap: 5px;">
          <input type="text" id="dmInput" placeholder="Напишите сообщение...">
          <button id="sendDmBtn" style="padding: 10px; background: #1C1C1C; color:white; border:none; border-radius:6px; cursor:pointer;">Отправить</button>
      </div>
      <button onclick="closeDmModal()" style="margin-top:10px; width:100%; padding:8px; background:none; border:none; color:#666; cursor:pointer;">Закрыть</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
  serverTimestamp, updateDoc, doc, increment, getDoc, deleteDoc, where, or, and
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { 
  getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_8QC9gvQadWPJeooOhUZf_YCtDBQ_rAM",
  authDomain: "po243-1d556.firebaseapp.com",
  projectId: "po243-1d556",
  storageBucket: "po243-1d556.firebasestorage.app",
  messagingSenderId: "497922929256",
  appId: "1:497922929256:web:bf45df24e1a3feefaac1dd",
  measurementId: "G-GZ9CJMJM31"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentEditingId = null;
let currentChatPartnerEmail = null;
let dmUnsubscribe = null;

// === ЛОГИКА ВХОДА ===
document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
document.getElementById('logoutBtn').onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
  const loginBtn = document.getElementById('loginBtn');
  const userInfo = document.getElementById('userInfo');
  const editorSection = document.getElementById('editorSection');

  if (user) {
    loginBtn.style.display = 'none';
    userInfo.style.display = 'flex';
    editorSection.style.display = 'block';
    document.getElementById('userName').innerText = user.displayName;
    document.getElementById('userPhoto').src = user.photoURL;
  } else {
    loginBtn.style.display = 'block';
    userInfo.style.display = 'none';
    editorSection.style.display = 'none';
  }
});

// === СОЗДАНИЕ ПОСТА ===
document.getElementById('mainBtn').onclick = async () => {
  const content = document.getElementById('content').value;
  const image = document.getElementById('imageUrl').value;
  if (!content.trim() && !image.trim()) return alert("Заполните текст или добавьте фото!");

  const btn = document.getElementById('mainBtn');
  btn.disabled = true;

  try {
    await addDoc(collection(db, "requests"), {
        name: auth.currentUser.displayName,
        email: auth.currentUser.email,
        photo: auth.currentUser.photoURL,
        content: content,
        image: image,
        likes: 0,
        timestamp: serverTimestamp()
    });
    document.getElementById("content").value = "";
    document.getElementById("imageUrl").value = "";
  } catch (e) {
    alert("Ошибка доступа!");
  } finally {
    btn.disabled = false;
  }
};

// === ОТОБРАЖЕНИЕ ЛЕНТЫ ===
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
  const feed = document.getElementById('feed');
  feed.innerHTML = "";
  
  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const isOwner = auth.currentUser && auth.currentUser.email === data.email;
    const editedBadge = data.edited ? ' <span class="badge">ред.</span>' : '';

    feed.innerHTML += `
      <div class="post">
        <div class="post-header">
          <div class="author-info">
            <img src="${data.photo || 'https://via.placeholder.com/40'}" class="user-avatar" style="width:30px; height:30px;">
            <div>
                <b>${data.name}</b>${editedBadge}
                <div class="time">${data.timestamp?.toDate().toLocaleString() || '...'}</div>
            </div>
          </div>
          <div class="post-actions">
            ${!isOwner && auth.currentUser ? `<button class="icon-btn" onclick="openDmModal('${data.email}', '${data.name}')" title="Написать сообщение">✉️</button>` : ''}
            ${isOwner ? `
                <button class="icon-btn" onclick="openEditModal('${docSnap.id}')">✏️</button>
                <button class="icon-btn" onclick="deletePost('${docSnap.id}')" style="color:red;">🗑️</button>
            ` : ''}
          </div>
        </div>
        <p style="margin: 15px 0; line-height: 1.5;">${data.content}</p>
        ${data.image ? `<img src="${data.image}" class="post-image" onerror="this.style.display='none'">` : ''}
        <button class="like-btn" onclick="processLike('${docSnap.id}')">❤️ ${data.likes || 0}</button>
      </div>
    `;
  });
});

// === СИСТЕМА ЛИЧНЫХ СООБЩЕНИЙ (DM) ===
window.openDmModal = (partnerEmail, partnerName) => {
    currentChatPartnerEmail = partnerEmail;
    document.getElementById('dmTitle').innerText = `Чат с ${partnerName}`;
    document.getElementById('dmModal').style.display = 'block';
    loadMessages(partnerEmail);
};

function loadMessages(partnerEmail) {
    if (dmUnsubscribe) dmUnsubscribe();
    
    // Запрос: сообщения где (я отправитель И он получатель) ИЛИ (он отправитель И я получатель)
    const qDm = query(
        collection(db, "messages"),
        orderBy("timestamp", "asc")
    );

    dmUnsubscribe = onSnapshot(qDm, (snapshot) => {
        const chatHistory = document.getElementById('chatHistory');
        chatHistory.innerHTML = "";
        snapshot.forEach(doc => {
            const m = doc.data();
            const myEmail = auth.currentUser.email;
            
            // Фильтруем только нашу переписку на стороне клиента (для простоты без сложных индексов)
            if ((m.from === myEmail && m.to === partnerEmail) || (m.from === partnerEmail && m.to === myEmail)) {
                const type = m.from === myEmail ? 'sent' : 'received';
                chatHistory.innerHTML += `<div class="msg ${type}">${m.text}</div>`;
            }
        });
        chatHistory.scrollTop = chatHistory.scrollHeight;
    });
}

document.getElementById('sendDmBtn').onclick = async () => {
    const input = document.getElementById('dmInput');
    const text = input.value.trim();
    if (!text || !currentChatPartnerEmail) return;

    await addDoc(collection(db, "messages"), {
        from: auth.currentUser.email,
        to: currentChatPartnerEmail,
        text: text,
        timestamp: serverTimestamp()
    });
    input.value = "";
};

window.closeDmModal = () => {
    document.getElementById('dmModal').style.display = 'none';
    if (dmUnsubscribe) dmUnsubscribe();
};

// === ОСТАЛЬНЫЕ ФУНКЦИИ ===
window.processLike = async (id) => {
  if(!auth.currentUser) return alert("Войдите для лайков!");
  await updateDoc(doc(db, "requests", id), { likes: increment(1) });
};

window.deletePost = async (id) => {
  if (confirm("Удалить этот пост?")) {
    await deleteDoc(doc(db, "requests", id));
  }
};

window.openEditModal = async (id) => {
  const docRef = doc(db, "requests", id);
  const docSnap = await getDoc(docRef);
  if (docSnap.exists()) {
    const data = docSnap.data();
    document.getElementById('editContent').value = data.content;
    document.getElementById('editImageUrl').value = data.image || "";
    currentEditingId = id;
    document.getElementById('editModal').style.display = 'block';
  }
};

window.saveEdit = async () => {
  const newContent = document.getElementById('editContent').value;
  const newImage = document.getElementById('editImageUrl').value;
  await updateDoc(doc(db, "requests", currentEditingId), {
    content: newContent,
    image: newImage,
    edited: true
  });
  closeEditModal();
};

window.closeEditModal = () => document.getElementById('editModal').style.display = 'none';

</script>
</body>
</html>
