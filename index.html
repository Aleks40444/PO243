<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BaaS</title>
<style>
body { font-family: 'Inter', sans-serif; background: #1C1C1C; display: flex; flex-direction: column; align-items: center; padding: 20px; }
.container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 8px 4px 15px rgba(0,0,0,0.05); }
input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
button#mainBtn { background: #1C1C1C; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
.post { background: #fff; border: 1px solid #eaeaea; padding: 25px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
.like-btn { cursor: pointer; border: none; background: #900020; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
.like-btn:hover { background: #e2e6ea; }
.time {font-size: 11px; color: #999; float: right; }
</style>
</head>
<body>
<div class="container">
  <h3>Панель управления данными</h3>
  <input type="text" id="name" placeholder="Имя профиля">
  <input type="email" id="email" placeholder="Рабочий Email">
  <button id="mainBtn">Опубликовать в облако</button>
</div>
<div style="margin: 10px; text-align: center;">
    <input type="email" id="search-email" placeholder="Поиск по Email">
    <button id="btn-search">Найти</button>
</div>
<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
  serverTimestamp, updateDoc, doc, increment 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// КОНФИГУРАЦИЯ FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyD_8QC9gvQadWPJeooOhUZf_YCtDBQ_rAM",
  authDomain: "po243-1d556.firebaseapp.com",
  projectId: "po243-1d556",
  storageBucket: "po243-1d556.firebasestorage.app",
  messagingSenderId: "497922929256",
  appId: "1:497922929256:web:bf45df24e1a3feefaac1dd",
  measurementId: "G-GZ9CJMJM31"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
// --- ФУНКЦИЯ №3: ПОИСК ---
document.getElementById("btn-search")?.addEventListener("click", async () => {
    const email = document.getElementById("search-email").value;
    
    // Создаем запрос к коллекции requests
    const q = query(collection(db, "requests"), where("email", "==", email));
    const querySnapshot = await getDocs(q);
    
    const feed = document.getElementById('feed');
    feed.innerHTML = "<h3>Результаты поиска:</h3>"; 
    
    querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();
        feed.innerHTML += `
            <div class="card">
                <b>${data.name}</b><br>
                ${data.email}
                <br>
                <button onclick="deleteRequestById('${docSnap.id}')" style="background:red; color:white; border:none; padding:5px; cursor:pointer;">
                    Удалить запись
                </button>
            </div>`;
    });
});

// --- ФУНКЦИЯ №5: УДАЛЕНИЕ (вынеси её отдельно!) ---
window.deleteRequestById = async (id) => {
    if (confirm("Удалить этот документ?")) {
        try {
            await deleteDoc(doc(db, "requests", id));
            alert("Удалено успешно!");
            // Страница обновится сама, если работает onSnapshot
        } catch (e) {
            console.error(e);
            alert("Ошибка при удалении. Проверьте Rules в Firebase.");
        }
    }
};
  
// МЕТОД: АТОМАРНОЕ ОБНОВЛЕНИЕ (LIKES)
window.processLike = async (id) => {
  const docRef = doc(db, "requests", id);
  try {
    await updateDoc(docRef, { likes: increment(1) });
  } catch (e) {
    console.error("Validation Error:", e.message);
  }
};

// МЕТОД: ЗАПИСЬ С ВАЛИДАЦИЕЙ
document.getElementById('mainBtn').onclick = async () => {
  const btn = document.getElementById('mainBtn');
  btn.disabled = true;
  try {
  // Внутри обработчика кнопки:
await addDoc(collection(db, "requests"), { // Обязательно "requests"!
    name: name,
    email: email,
    timestamp: serverTimestamp() // Используй это вместо Date().toISOString()
});
    document.getElementById("email").value = "";
    document.getElementById("name").value = "";
  } catch (e) {
    alert("Ошибка безопасности: Данные отклонены сервером.");
  btn.disabled = false;
};
}

// МЕТОД: REAL-TIME СИНХРОНИЗАЦИЯ
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
  const feed = document.getElementById('feed');
  feed.innerHTML = "";
  snapshot.forEach((doc) => {
    const data = doc.data();
    feed.innerHTML += `
      <div class="post">
        <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
        <b>${data.name}</b>
        <p style="margin: 5px 0;">${data.email}</p>
        <button class="like-btn" onclick="processLike('${doc.id}')">${data.likes || 0}</button>
      </div>
    `;
  });
});
</script>
</body>
</html>
